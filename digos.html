<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Zel Salon DTR System</title>
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icon.png">
  <style>
    :root {
      --bg: #09090b;
      --card-bg: rgba(24, 24, 27, 0.9);
      --brand-yellow: #facc15;
      --text: #f4f4f5;
    }

    html, body {
      margin: 0; padding: 0; width: 100%; height: 100%;
      background-color: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      overflow: hidden;
    }

    .app-container {
      display: flex; flex-direction: column; height: 100%;
      box-sizing: border-box;
    }

    .status-bar {
      background: var(--card-bg);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      padding: calc(12px + env(safe-area-inset-top)) 16px 12px 16px;
      display: flex; justify-content: space-between; align-items: center;
      flex-shrink: 0;
    }

    .system-title {
      color: var(--text); font-size: 16px; font-weight: 800; letter-spacing: 0.03em;
    }
    .system-title span { color: var(--brand-yellow); }

    .right-section {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .live-clock {
      color: var(--brand-yellow); font-size: 14px; font-weight: 700; font-family: monospace;
    }

    /* Universal Branded Install Button */
    #install-btn {
      display: none; /* Hidden if already installed */
      background: var(--brand-yellow);
      color: #000000;
      border: none;
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 700;
      border-radius: 4px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    iframe {
      flex: 1; width: 100%; height: 100%; border: none; background: #ffffff;
    }

    /* Universal Prompt Instructions Dropdown */
    #universal-prompt {
      display: none;
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #18181b;
      color: #ffffff;
      padding: 14px 20px;
      border-radius: 8px;
      border: 1px solid var(--brand-yellow);
      width: 85%;
      max-width: 340px;
      z-index: 9999;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      font-size: 13px;
      text-align: center;
    }
    #universal-prompt span { color: var(--brand-yellow); font-weight: bold; }
    #universal-prompt .close-prompt {
      display: block;
      margin-top: 8px;
      color: #a1a1aa;
      font-size: 11px;
      text-decoration: underline;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="app-container">
    <div class="status-bar">
      <div class="system-title">ZEL SALON <span>DTR</span></div>
      <div class="right-section">
        <button id="install-btn">Install App</button>
        <div class="live-clock" id="clockDisplay">00:00:00 AM</div>
      </div>
    </div>
    
    <iframe src="https://script.google.com/macros/s/AKfycbw5cNxN9LWk3KEuw3Zhm99sLB2Y_a424lWrqivT6zyVn1WRZO16J44DWSzewlLPddcR/exec"></iframe>
  </div>

  <div id="universal-prompt">
    <div id="prompt-text">Tap your browser options menu and select <span>'Add to Home Screen'</span> to download the app!</div>
    <div class="close-prompt" onclick="document.getElementById('universal-prompt').style.display='none'">Dismiss</div>
  </div>

  <script>
    function updateClock() {
      const now = new Date();
      let hours = now.getHours();
      const minutes = String(now.getMinutes()).padStart(2, '0');
      const seconds = String(now.getSeconds()).padStart(2, '0');
      const ampm = hours >= 12 ? 'PM' : 'AM';
      hours = hours % 12;
      hours = hours ? hours : 12;
      document.getElementById('clockDisplay').innerText = `${String(hours).padStart(2, '0')}:${minutes}:${seconds} ${ampm}`;
    }
    setInterval(updateClock, 1000);
    updateClock();

    const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
    const installBtn = document.getElementById('install-btn');
    const universalPrompt = document.getElementById('universal-prompt');
    const promptText = document.getElementById('prompt-text');
    
    let deferredPrompt;

    // Show install button for all standard browser tabs
    if (!isStandalone) {
      installBtn.style.display = 'block';
    }

    // Handles Android / Chrome / Edge native installs
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
    });

    installBtn.addEventListener('click', async () => {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        if (outcome === 'accepted') {
          deferredPrompt = null;
          installBtn.style.display = 'none';
        }
        return;
      }

      // Universal Platform Fallback Instructions
      const userAgent = navigator.userAgent || navigator.vendor || window.opera;
      
      if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) {
        // iOS Safari 
        promptText.innerHTML = "Tap the <span>Share icon</span> (square with up arrow) at the bottom, then select <span>'Add to Home Screen'</span>!";
      } else if (/CriOS/.test(userAgent)) {
        // iOS Chrome
        promptText.innerHTML = "Tap the <span>Share icon</span> near the URL bar, then select <span>'Add to Home Screen'</span>!";
      } else {
        // Generic fallback for Samsung Internet, Opera, etc.
        promptText.innerHTML = "Open your browser's menu (three dots or lines) and tap <span>'Add to Home Screen'</span> or <span>'Install app'</span>!";
      }
      
      universalPrompt.style.display = 'block';
    });

    window.addEventListener('appinstalled', () => {
      deferredPrompt = null;
      installBtn.style.display = 'none';
      universalPrompt.style.display = 'none';
    });

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').then(() => console.log('DTR Pipeline Ready'));
    }
  </script>
</body>
</html>
