<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Zel Salon DTR System</title>
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icon.png">
  <style>
    :root {
      --bg: #09090b;
      --card-bg: rgba(24, 24, 27, 0.9);
      --brand-yellow: #facc15;
      --text: #f4f4f5;
    }

    html, body {
      margin: 0; padding: 0; width: 100%; height: 100%;
      background-color: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      overflow: hidden;
    }

    .app-container {
      display: flex; flex-direction: column; height: 100%;
      box-sizing: border-box;
    }

    .status-bar {
      background: var(--card-bg);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      padding: calc(12px + env(safe-area-inset-top)) 16px 12px 16px;
      display: flex; justify-content: space-between; align-items: center;
      flex-shrink: 0;
    }

    .system-title {
      color: var(--text); font-size: 16px; font-weight: 800; letter-spacing: 0.03em;
    }
    .system-title span { color: var(--brand-yellow); }

    .right-section {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .live-clock {
      color: var(--brand-yellow); font-size: 14px; font-weight: 700; font-family: monospace;
    }

    /* Branded Matte Yellow Install Button */
    #install-btn {
      display: none; /* Hidden by default, shown via JS if installable */
      background: var(--brand-yellow);
      color: #000000;
      border: none;
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 700;
      border-radius: 4px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    #iframe-container {
      flex: 1; width: 100%; height: 100%; display: flex;
    }

    iframe {
      flex: 1; width: 100%; height: 100%; border: none; background: #ffffff;
    }

    /* iOS Installation Instruction Banner */
    #ios-prompt {
      display: none;
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #18181b;
      color: #ffffff;
      padding: 14px 20px;
      border-radius: 8px;
      border: 1px solid var(--brand-yellow);
      width: 85%;
      max-width: 340px;
      z-index: 9999;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      font-size: 13px;
      text-align: center;
    }
    #ios-prompt span { color: var(--brand-yellow); font-weight: bold; }
    #ios-prompt .close-ios {
      display: block;
      margin-top: 8px;
      color: #a1a1aa;
      font-size: 11px;
      text-decoration: underline;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="app-container">
    <div class="status-bar">
      <div class="system-title">ZEL SALON <span>DTR</span></div>
      <div class="right-section">
        <button id="install-btn">Install App</button>
        <div class="live-clock" id="clockDisplay">00:00:00 AM</div>
      </div>
    </div>
    
    <div id="iframe-container"></div>
  </div>

  <!-- Instruction popover if user is on Safari/iOS -->
  <div id="ios-prompt">
    Tap the <span>Share button</span> below, then select <span>'Add to Home Screen'</span> to save the Zel DTR App with its icon!
    <div class="close-ios" onclick="document.getElementById('ios-prompt').style.display='none'">Dismiss</div>
  </div>

  <script>
    function updateClock() {
      const now = new Date();
      let hours = now.getHours();
      const minutes = String(now.getMinutes()).padStart(2, '0');
      const seconds = String(now.getSeconds()).padStart(2, '0');
      const ampm = hours >= 12 ? 'PM' : 'AM';
      hours = hours % 12;
      hours = hours ? hours : 12;
      document.getElementById('clockDisplay').innerText = `${String(hours).padStart(2, '0')}:${minutes}:${seconds} ${ampm}`;
    }
    setInterval(updateClock, 1000);
    updateClock();

    // Secure deployment routing loader
    window.addEventListener('DOMContentLoaded', () => {
      const container = document.getElementById('iframe-container');
      const baseUrl = "https://script.google.com/macros/s/AKfycbz1AgTZZiKdtHHzILEyJk91m6SRAopaOQzQ2Q8SI34ByE6u2dct9wfbtlvB-Z7C1y2lEA/exec";
      const accountBypass = "?authuser=0"; 
      
      const iframe = document.createElement('iframe');
      iframe.src = baseUrl + accountBypass;
      container.appendChild(iframe);
      
      // Intelligent iOS vs Android install feature check
      const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
      const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
      
      if (isIOS && !isStandalone) {
        // Show install button for iOS users to open instruction box
        document.getElementById('install-btn').style.display = 'block';
      }
    });

    // PWA Programmatic System Hooks
    let deferredPrompt;
    const installBtn = document.getElementById('install-btn');

    window.addEventListener('beforeinstallprompt', (e) => {
      // Prevent standard small browser banner so our main top-bar button handles it
      e.preventDefault();
      deferredPrompt = e;
      installBtn.style.display = 'block';
    });

    installBtn.addEventListener('click', async () => {
      const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
      
      if (isIOS) {
        // Pop open detailed custom popup panel for Apple Safari users
        document.getElementById('ios-prompt').style.display = 'block';
        return;
      }

      if (!deferredPrompt) return;
      
      // Fire Native Android app configuration utility
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      if (outcome === 'accepted') {
        deferredPrompt = null;
        installBtn.style.display = 'none';
      }
    });

    // Hide installation buttons completely if already launched as standalone application
    window.addEventListener('appinstalled', () => {
      deferredPrompt = null;
      installBtn.style.display = 'none';
    });

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').then(() => console.log('DTR Pipeline Ready'));
    }
  </script>
</body>
</html>
