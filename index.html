<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Zel Salon DTR System</title>
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icon.png">
  <style>
    :root {
      --bg: #09090b;
      --card-bg: rgba(24, 24, 27, 0.9);
      --brand-yellow: #facc15;
      --text: #f4f4f5;
    }

    html, body {
      margin: 0; padding: 0; width: 100%; height: 100%;
      background-color: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      overflow: hidden;
    }

    .app-container {
      display: flex; flex-direction: column; height: 100%;
      box-sizing: border-box;
    }

    .status-bar {
      background: var(--card-bg);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      padding: calc(12px + env(safe-area-inset-top)) 16px 12px 16px;
      display: flex; justify-content: space-between; align-items: center;
      flex-shrink: 0;
    }

    .system-title {
      color: var(--text); font-size: 16px; font-weight: 800; letter-spacing: 0.03em;
    }
    .system-title span { color: var(--brand-yellow); }

    .live-clock {
      color: var(--brand-yellow); font-size: 14px; font-weight: 700; font-family: monospace;
    }

    iframe {
      flex: 1; width: 100%; height: 100%; border: none; background: #ffffff;
    }
  </style>
</head>
<body>

  <div class="app-container">
    <div class="status-bar">
      <div class="system-title">ZEL SALON <span>DTR</span></div>
      <div class="live-clock" id="clockDisplay">00:00:00 AM</div>
    </div>
    
    <iframe src="https://script.google.com/macros/s/AKfycbz1AgTZZiKdtHHzILEyJk91m6SRAopa0QzQ2Q8SI34ByE6u2dct9wfbtlvB-Z7C1y2lEA/exec"></iframe>
  </div>

  <script>
    function updateClock() {
      const now = new Date();
      let hours = now.getHours();
      const minutes = String(now.getMinutes()).padStart(2, '0');
      const seconds = String(now.getSeconds()).padStart(2, '0');
      const ampm = hours >= 12 ? 'PM' : 'AM';
      hours = hours % 12;
      hours = hours ? hours : 12;
      document.getElementById('clockDisplay').innerText = `${String(hours).padStart(2, '0')}:${minutes}:${seconds} ${ampm}`;
    }
    setInterval(updateClock, 1000);
    updateClock();

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').then(() => console.log('DTR Pipeline Ready'));
    }
  </script>
</body>
</html>
